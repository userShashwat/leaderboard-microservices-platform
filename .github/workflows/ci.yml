name: Leaderboard Management System CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  build:

    name: Build & Test Services

    runs-on: ubuntu-latest

    strategy:
      fail-fast: true

      matrix:
        service:
          - userservice
          - submission-service
          - leaderboard-service
          - api-gateway
          - eureka-server

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Maven Wrapper
        run: chmod +x mvnw || true

      - name: Build Project
        run: mvn clean package

      - name: Run Unit Tests
        run: mvn test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar