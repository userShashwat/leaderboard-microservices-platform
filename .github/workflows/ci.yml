name: Leaderboard Management System CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test Eureka Server
        working-directory: ./eureka-server
        run: mvn clean verify

      - name: Build and Test API Gateway
        working-directory: ./api-gateway
        run: mvn clean verify

      - name: Build and Test User Service
        working-directory: ./userservice
        run: mvn clean verify

      - name: Build and Test Submission Service
        working-directory: ./submission-service
        run: mvn clean verify

      - name: Build and Test Leaderboard Service
        working-directory: ./leaderboard-service
        run: mvn clean verify

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/

      - name: Upload Eureka Server JAR
        uses: actions/upload-artifact@v4
        with:
          name: eureka-server
          path: eureka-server/target/*.jar

      - name: Upload API Gateway JAR
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway
          path: api-gateway/target/*.jar

      - name: Upload User Service JAR
        uses: actions/upload-artifact@v4
        with:
          name: userservice
          path: userservice/target/*.jar

      - name: Upload Submission Service JAR
        uses: actions/upload-artifact@v4
        with:
          name: submission-service
          path: submission-service/target/*.jar

      - name: Upload Leaderboard Service JAR
        uses: actions/upload-artifact@v4
        with:
          name: leaderboard-service
          path: leaderboard-service/target/*.jar

      - name: Build Docker Images
        run: docker compose build

      - name: Validate Docker Compose
        run: docker compose config

      - name: CI Completed
        run: echo "All services built, tested, and Docker images verified successfully."