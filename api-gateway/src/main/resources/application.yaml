server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: submission-service
          uri: lb://submission-service
          predicates:
            - Path=/api/contests/**,/api/problems/**,/api/submissions/**



eureka:
  instance:
    ip-address: 127.0.0.1
    prefer-ip-address: true

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,routes
  endpoint:
    gateway:
      enabled: true
